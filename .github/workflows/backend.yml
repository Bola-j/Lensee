name: backend

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-test-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Lensee.slnx

      - name: Build
        run: dotnet build Lensee.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Lensee.slnx --configuration Release --no-build --no-restore --verbosity normal

      - name: Format check
        run: dotnet format Lensee.slnx --verify-no-changes --no-restore
